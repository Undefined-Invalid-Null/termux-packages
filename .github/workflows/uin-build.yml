name: UIN.Tool Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/termux/package-builder
    strategy:
      matrix:
        arch: [aarch64, arm, i686, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Debug - Find actual NDK location
        run: |
          echo "=== Finding NDK ==="
          find / -type d -name "android-ndk*" 2>/dev/null | head -10
          echo "=== Finding NDK by common paths ==="
          ls -la /opt/ 2>/dev/null || echo "No /opt"
          ls -la /usr/local/ 2>/dev/null || echo "No /usr/local"
          ls -la /github/home/lib/ 2>/dev/null || echo "No /github/home/lib"
          echo "=== NDK environment variable ==="
          echo "NDK=$NDK"
          echo "=== Check if NDK is set in container ==="
          env | grep -i ndk

      - name: Fix package name and NDK
        run: |
          # 修改包名
          sed -i 's/com.termux/com.UIN.Tool/g' scripts/properties.sh
          
          # 查找实际的 NDK 路径
          if [ -d "/github/home/lib/android-ndk-r29" ]; then
            REAL_NDK="/github/home/lib/android-ndk-r29"
          elif [ -d "/opt/android-ndk" ]; then
            REAL_NDK="/opt/android-ndk"
          elif [ -d "/android-ndk" ]; then
            REAL_NDK="/android-ndk"
          else
            # 在容器中搜索
            REAL_NDK=$(find / -type d -name "android-ndk*" 2>/dev/null | head -1)
          fi
          
          echo "Real NDK path: $REAL_NDK"
          
          # 修改 NDK 路径
          sed -i "s|/android-ndk|$REAL_NDK|g" scripts/properties.sh
          sed -i "s|/github/home/lib/android-ndk-r29|$REAL_NDK|g" scripts/properties.sh
          
          echo "export TERMUX_INSTALL_DEPS=true" >> scripts/properties.sh

      - name: Build
        run: ./build-package.sh -a ${{ matrix.arch }} bash

      - uses: actions/upload-artifact@v4
        with:
          name: uin-tool-debs-${{ matrix.arch }}
          path: output/