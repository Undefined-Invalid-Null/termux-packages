name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/termux/package-builder
    steps:
    - uses: actions/checkout@v4
    
    - name: Change package name
      run: sed -i 's/com.termux/com.UIN.Tool/g' scripts/properties.sh
    
    - name: Build with explicit NDK path
      run: |
        export NDK=/android-ndk
        export ANDROID_HOME=/android-sdk
        ./build-package.sh -a aarch64 bash
    
    - uses: actions/upload-artifact@v4
      with:
        name: debs
        path: output/