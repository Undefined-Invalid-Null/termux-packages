name: UIN.Tool Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/termux/package-builder
    strategy:
      matrix:
        arch: [aarch64, arm, i686, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Fix configuration
        run: |
          # 修改包名
          sed -i 's/com.termux/com.UIN.Tool/g' scripts/properties.sh
          
          # 设置正确的 NDK 路径
          sed -i 's|/github/home/lib/android-ndk-r29|/home/builder/lib/android-ndk-r29|g' scripts/properties.sh
          sed -i 's|/android-ndk|/home/builder/lib/android-ndk-r29|g' scripts/properties.sh
          
          # 强制启用依赖下载
          echo "export TERMUX_INSTALL_DEPS=true" >> scripts/properties.sh
          
          # 验证修改
          grep "NDK" scripts/properties.sh | head -3

      - name: Build
        run: |
          export NDK=/home/builder/lib/android-ndk-r29
          export ANDROID_HOME=/home/builder/lib/android-sdk-9123335
          ./build-package.sh -a ${{ matrix.arch }} bash

      - uses: actions/upload-artifact@v4
        with:
          name: uin-tool-debs-${{ matrix.arch }}
          path: output/