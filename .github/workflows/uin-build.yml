name: UIN.Tool Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/termux/package-builder
      options: --user root --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          sed -i 's/com.termux/com.UIN.Tool/g' scripts/properties.sh
          sed -i 's|/github/home/lib/android-ndk-r29|/home/builder/lib/android-ndk-r29|g' scripts/properties.sh
          echo "export TERMUX_INSTALL_DEPS=true" >> scripts/properties.sh

      - name: Build
        run: |
          export NDK=/home/builder/lib/android-ndk-r29
          export ANDROID_HOME=/home/builder/lib/android-sdk-9123335
          export TERMUX_INSTALL_DEPS=true
          ./build-package.sh -a aarch64 bash || true

      - name: Upload config.log
        uses: actions/upload-artifact@v4
        with:
          name: config-log
          path: |
            /home/builder/.termux-build/bash/src/config.log
            /github/home/.termux-build/bash/src/config.log
          retention-days: 7

      - name: Show config.log
        run: |
          echo "=== config.log content ==="
          cat /home/builder/.termux-build/bash/src/config.log 2>/dev/null || echo "Not found in /home/builder"
          cat /github/home/.termux-build/bash/src/config.log 2>/dev/null || echo "Not found in /github/home"