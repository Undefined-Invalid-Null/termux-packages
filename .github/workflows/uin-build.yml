name: UIN.Tool Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/termux/package-builder
      options: --user root --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup UIN.Tool environment
        run: |
          # 修改包名
          sed -i 's/com.termux/com.UIN.Tool/g' scripts/properties.sh
          
          # 修正 NDK 路径
          sed -i 's|/github/home/lib/android-ndk-r29|/home/builder/lib/android-ndk-r29|g' scripts/properties.sh
          
          # 启用依赖下载
          echo "export TERMUX_INSTALL_DEPS=true" >> scripts/properties.sh
          
          # 设置正确的环境变量
          echo "export PATH=/home/builder/lib/android-ndk-r29/toolchains/llvm/prebuilt/linux-x86_64/bin:\$PATH" >> scripts/properties.sh

      - name: Build bash for aarch64
        run: |
          export NDK=/home/builder/lib/android-ndk-r29
          export ANDROID_HOME=/home/builder/lib/android-sdk-9123335
          export TERMUX_INSTALL_DEPS=true
          ./build-package.sh -a aarch64 bash

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: uin-tool-bash-aarch64
          path: output/