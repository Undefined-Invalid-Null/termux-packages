name: UIN.Tool Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build'
        required: false
        default: 'bash'
        type: string

env:
  TERMUX_APP_PACKAGE_NAME: "com.UIN.Tool"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, arm, i686, x86_64]
    runs-on: ubuntu-latest
    container: 
      image: ghcr.io/termux/package-builder
      options: --user root
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup environment
        shell: bash
        run: |
          # 修复 NDK 路径
          if [ -d "/android-ndk" ]; then
            mkdir -p /github/home/lib
            ln -sf /android-ndk /github/home/lib/android-ndk-r29
            echo "NDK linked to /github/home/lib/android-ndk-r29"
          fi
          
          # 验证 NDK
          ls -la /github/home/lib/ || true
          
          # 设置环境变量
          echo "NDK=/github/home/lib/android-ndk-r29" >> $GITHUB_ENV
          echo "ANDROID_HOME=/github/home/lib/android-sdk-9123335" >> $GITHUB_ENV
      
      - name: Apply UIN.Tool patches
        shell: bash
        run: |
          # 直接修改 properties.sh
          cat >> scripts/properties.sh << 'EOF'

# UIN.Tool - Override package name
TERMUX_APP__PACKAGE_NAME="com.UIN.Tool"
TERMUX_APP__NAMESPACE="com.UIN.Tool"
TERMUX_REPO_APP__PACKAGE_NAME="com.UIN.Tool"
TERMUX_APP_PACKAGE="com.UIN.Tool"
TERMUX_APP__DATA_DIR="/data/data/com.UIN.Tool"

# Force download of dependencies (skip package name check)
TERMUX_INSTALL_DEPS=true
TERMUX_FORCE_BUILD_DEPENDENCIES=false
EOF
          
          # 验证修改
          grep -E "TERMUX_(APP|REPO)_" scripts/properties.sh | head -10
      
      - name: Build package
        shell: bash
        run: |
          export TERMUX_APP_PACKAGE_NAME="com.UIN.Tool"
          export TERMUX_APP_PACKAGE="com.UIN.Tool"
          export TERMUX_REPO_APP__PACKAGE_NAME="com.UIN.Tool"
          export TERMUX_INSTALL_DEPS=true
          
          PACKAGE="${{ github.event.inputs.package || 'bash' }}"
          echo "Building: $PACKAGE for ${{ matrix.arch }}"
          
          ./build-package.sh -a ${{ matrix.arch }} "$PACKAGE" || {
            echo "Build failed, trying with -i flag..."
            ./build-package.sh -a ${{ matrix.arch }} -i "$PACKAGE"
          }
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uin-tool-${{ matrix.arch }}
          path: output/
          retention-days: 7