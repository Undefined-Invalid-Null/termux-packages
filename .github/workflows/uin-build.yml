name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/termux/package-builder
    steps:
    - uses: actions/checkout@v4
    
    - name: Change package name
      run: sed -i 's/com.termux/com.UIN.Tool/g' scripts/properties.sh
    
    - name: Fix NDK path
      run: |
        # 创建正确的 NDK 路径符号链接
        mkdir -p /github/home/lib
        ln -sf /android-ndk /github/home/lib/android-ndk-r29
        echo "NDK fixed"
        ls -la /github/home/lib/
    
    - name: Build
      run: ./build-package.sh -a aarch64 bash
    
    - uses: actions/upload-artifact@v4
      with:
        name: debs
        path: output/